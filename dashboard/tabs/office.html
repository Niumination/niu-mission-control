<!-- Tab Office -->
<div class="widget full" style="margin-bottom:24px;">
  <h3>🏢 Agent Office — Command Center Tower</h3>
  <p style="font-size:11px;color:#64748b;margin-bottom:16px;">Visualisasi aktivitas agen Niu-MissionControl. Semakin tinggi tower = semakin banyak tugas.</p>
  <div id="tower-container" style="display:flex;justify-content:space-around;align-items:flex-end;gap:8px;padding:24px 0;min-height:260px;"></div>
</div>

<style>
.agent-tower { display:flex; flex-direction:column; align-items:center; width:72px; transition:all 0.3s; }
.tower-body { width:48px; border-radius:6px 6px 2px 2px; transition:height 0.5s ease-in-out, background 0.5s; position:relative; min-height:20px; }
.tower-base { width:64px; height:10px; border-radius:3px; margin-top:2px; }
.tower-glow { position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:12px; height:12px; border-radius:50%; }
.agent-tower .tower-label { font-size:9px; margin-top:6px; text-align:center; color:#94a3b8; font-weight:600; }
.agent-tower .tower-count { font-size:8px; color:#64748b; }
.tower-active { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
</style>

<div class="widget full">
  <h3>🌱 Ringkasan Ekosistem</h3>
  <div id="office-ecosystem"><div class="loading-el">Memuat...</div></div>
</div>

<div class="widget full">
  <h3>🖥️ Terminal Cepat</h3>
  <p style="font-size:11px;color:#64748b;margin-bottom:8px;">Jalankan perintah shell langsung dari dashboard. Hanya untuk debugging.</p>
  <div style="display:flex;gap:8px;">
    <input type="text" id="office-cmd" placeholder="ls -la /" style="flex:1;background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 12px;border-radius:6px;">
    <button onclick="runOfficeCmd()" style="background:#1e293b;border:1px solid #22d3ee;color:#22d3ee;font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 16px;border-radius:6px;cursor:pointer;">Jalankan ▶</button>
  </div>
  <div id="office-output" style="margin-top:8px;font-size:11px;color:#64748b;font-family:'JetBrains Mono',monospace;"></div>
</div>
