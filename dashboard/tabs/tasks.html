<!-- Tab Tasks -->
<div class="widget full">
  <h3>📋 Task Manager</h3>
  <div style="margin-bottom:16px;">
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <input type="text" id="task-input" placeholder="Tambah task baru..." style="flex:1;background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 12px;border-radius:6px;">
      <select id="task-priority" style="background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 12px;border-radius:6px;">
        <option value="P0">P0 — Kritis</option>
        <option value="P1">P1 — Tinggi</option>
        <option value="P2">P2 — Normal</option>
        <option value="P3">P3 — Rendah</option>
      </select>
      <button onclick="addTask()" style="background:#1e293b;border:1px solid #22d3ee;color:#22d3ee;font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 16px;border-radius:6px;cursor:pointer;">Tambah ➕</button>
    </div>
  </div>
  <div id="tasks-list"><div class="loading-el">Memuat task dari Kanban...</div></div>
</div>
